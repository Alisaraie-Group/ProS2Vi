<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualization Result - ProS2Vi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: #f0f2f5;
            min-height: 100vh;
            padding: 40px 20px;
        }
        .main-container {
            max-width: 1200px;
            margin: auto;
            background-color: #fff;
            padding: 32px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        }
        .success-header {
            text-align: center;
            margin-bottom: 24px;
        }
        .success-icon {
            width: 64px;
            height: 64px;
            background-color: #d1e7dd;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
        }
        .success-icon i {
            font-size: 32px;
            color: #198754;
        }
        .success-title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 8px;
        }
        .filename-badge {
            display: inline-block;
            background-color: #e9ecef;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 14px;
            color: #495057;
        }
        .image-container {
            background-color: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            margin: 24px 0;
            text-align: center;
            border: 1px solid #e9ecef;
            overflow: auto;
            max-height: 70vh;
        }
        .image-container img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }
        .action-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .btn-action {
            padding: 12px 24px;
            font-size: 15px;
            font-weight: 500;
            border-radius: 10px;
            transition: all 0.2s;
        }
        .btn-action:hover {
            transform: translateY(-1px);
        }
        .btn-download {
            background-color: #198754;
            border-color: #198754;
        }
        .btn-download:hover {
            background-color: #157347;
            border-color: #146c43;
            box-shadow: 0 4px 12px rgba(25, 135, 84, 0.4);
        }
        .btn-new {
            background-color: #0d6efd;
            border-color: #0d6efd;
        }
        .btn-new:hover {
            background-color: #0b5ed7;
            border-color: #0a58ca;
            box-shadow: 0 4px 12px rgba(13, 110, 253, 0.4);
        }
        .tips-section {
            margin-top: 32px;
            padding: 20px;
            background-color: #f8f9fa;
            border-radius: 12px;
            border-left: 4px solid #0d6efd;
        }
        .tips-title {
            font-size: 14px;
            font-weight: 600;
            color: #0d6efd;
            margin-bottom: 12px;
        }
        .tips-list {
            list-style: none;
            padding: 0;
            margin: 0;
            font-size: 13px;
            color: #6c757d;
        }
        .tips-list li {
            padding: 4px 0;
        }
        .tips-list li i {
            color: #0d6efd;
            margin-right: 8px;
        }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="success-header">
            <div class="success-icon">
                <i class="bi bi-check-lg"></i>
            </div>
            <h1 class="success-title">Visualization Complete</h1>
            <span class="filename-badge">
                <i class="bi bi-file-image me-1"></i>{{ filename }}
            </span>
        </div>

        <div class="image-container">
            <img src="{{ url_for('result_image', filename=filename) }}" alt="Protein Secondary Structure Visualization">
        </div>

        <div class="action-buttons">
            <a href="{{ url_for('result_image', filename=filename) }}" download="{{ filename }}" class="btn btn-action btn-download text-white">
                <i class="bi bi-download me-2"></i>Download Image
            </a>
            <a href="/" class="btn btn-action btn-new text-white">
                <i class="bi bi-plus-lg me-2"></i>New Visualization
            </a>
        </div>

        <div class="tips-section">
            <div class="tips-title"><i class="bi bi-lightbulb me-1"></i> Tips for Publication</div>
            <ul class="tips-list">
                <li><i class="bi bi-check2"></i> For print publications, ensure you used 300+ DPI</li>
                <li><i class="bi bi-check2"></i> Consider using PDF output for vector graphics (scalable)</li>
                <li><i class="bi bi-check2"></i> Right-click the image to copy directly to your document</li>
            </ul>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
